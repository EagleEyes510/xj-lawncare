<!DOCTYPE html>
<html>
<head>
<title>Get a Quote - XJ Lawncare</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #f4f8f4;
}

.quote-container {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.title {
    text-align: center;
    font-size: 32px;
    font-weight: bold;
}

.quote-box {
    display: flex;
    gap: 40px;
    background: white;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 5px 20px #bbb;
}

.option {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

label {
    font-size: 20px;
    font-weight: bold;
}

select, input {
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #aaa;
    width: 220px;
}

button {
    background: #228B22;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background: #176617;
}

#customSize {
    display: none;
}

#price {
    text-align: center;
}
</style>

</head>


<body>

<div class="quote-container">

<div class="title">
    Get a Quote
</div>


<div class="quote-box">


<div class="option">

<label>Lawn size:</label>

<select id="size" onchange="toggleCustomSize()">

<option value="1500">1500 or less</option>

<option value="2000">2000</option>

<option value="3000">3000 or more</option>

</select>


<input 
id="customSize"
type="number"
placeholder="Enter sq ft">

</div>



<div class="option">

<label>Grass height:</label>

<select id="height">

<option value="1">Short</option>
<option value="2">Medium</option>
<option value="3">Tall</option>

</select>

</div>


</div>



<div class="quote-box">


<div class="option">

<label>Work required:</label>

<select id="work">

<option value="2">Mowing</option>
<option value="5">Weeding</option>
<option value="5">Snowblowing</option>
<option value="2.5">Raking</option>

</select>

</div>


</div>



<button onclick="calculateQuote()">
Calculate Quote
</button>


<h2 id="price"></h2>


</div>



<script>


function toggleCustomSize() {

let size =
document.getElementById("size").value;

let box =
document.getElementById("customSize");


if (size == "3000") {
    box.style.display = "block";
} else {
    box.style.display = "none";
}

}



function calculateQuote() {


let sizeChoice =
document.getElementById("size").value;


let height =
Number(document.getElementById("height").value);


let work =
Number(document.getElementById("work").value);



let sizePrice;



if (sizeChoice == "1500") {

    sizePrice = 15;

}


else if (sizeChoice == "2000") {

    sizePrice = 30;

}


else {


let customSize =
Number(document.getElementById("customSize").value);


if (!customSize) {

document.getElementById("price").innerHTML =
"Enter your lawn size";

return;

}


sizePrice = (customSize / 100) + 10;


}



let quote =
sizePrice + (height * 5) + work;



document.getElementById("price").innerHTML =
"Estimated Quote: $" + quote.toFixed(2);


}


</script>


</body>
</html>
